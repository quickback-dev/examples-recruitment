name = "recruitment-example"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]


[dev]
port = 8787


# Static Assets (embedded SPA)
[assets]
binding = "ASSETS"
directory = "src/apps"
not_found_handling = "none"
run_worker_first = true


[observability]
enabled = true


# Auth Database (Better Auth tables: users, sessions, accounts, organizations, members, etc.)
[[d1_databases]]
binding = "AUTH_DB"
database_name = "recruitment-example-auth"
database_id = "00000000-0000-0000-0000-000000000001"
migrations_dir = "quickback/drizzle/auth"

# Features Database (application tables)
[[d1_databases]]
binding = "DB"
database_name = "recruitment-example-features"
database_id = "00000000-0000-0000-0000-000000000002"
migrations_dir = "quickback/drizzle/features"


# Webhooks Database (webhook events, endpoints, deliveries)
[[d1_databases]]
binding = "WEBHOOKS_DB"
database_name = "recruitment-example-webhooks"
database_id = "00000000-0000-0000-0000-000000000003"
migrations_dir = "quickback/drizzle/webhooks"

[[kv_namespaces]]
binding = "KV"
id = "00000000000000000000000000000004"

# Webhook Processing Queue (inbound + outbound)
[[queues.producers]]
queue = "recruitment-example-webhooks-queue"
binding = "WEBHOOKS_QUEUE"

[[queues.consumers]]
queue = "recruitment-example-webhooks-queue"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "recruitment-example-webhooks-dlq"

# Dead Letter Queue for Failed Webhooks
[[queues.consumers]]
queue = "recruitment-example-webhooks-dlq"
max_batch_size = 1

