# =============================================================================
# wrangler.toml — Cloudflare Workers config for q-recruit
# =============================================================================
#
# Generated by Quickback. Runs LOCALLY as-is with `npm run dev`.
#
# To DEPLOY to your own Cloudflare account, do the following:
#   1. Create the three D1 databases:
#        npx wrangler d1 create q-recruit-auth
#        npx wrangler d1 create q-recruit-features
#        npx wrangler d1 create q-recruit-webhooks
#      Copy each returned `database_id` into the matching [[d1_databases]]
#      block below (replacing the placeholder UUIDs).
#
#   2. Create the KV namespace:
#        npx wrangler kv namespace create q-recruit-kv
#      Copy the returned `id` into the [[kv_namespaces]] block below.
#
#   3. Replace the `routes` section with your own domain(s), or remove it
#      to get a workers.dev subdomain.
#
#   4. Set your production secret:
#        npx wrangler secret put BETTER_AUTH_SECRET
#
#   5. Deploy:
#        npm run deploy
#
# This file is managed by the Quickback compiler. To change the structure,
# edit quickback/quickback.config.ts and run `npx @quickback-dev/cli compile`.
# =============================================================================

name = "q-recruit"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# --- DEPLOY: replace with your own domain(s), or remove this block entirely
# to deploy to a workers.dev subdomain (e.g. q-recruit.your-account.workers.dev).
# routes = [
#   { pattern = "recruit.yourdomain.com", custom_domain = true }
# ]


[dev]
port = 8787


[observability]
enabled = true


# -----------------------------------------------------------------------------
# D1 Databases
# -----------------------------------------------------------------------------
# Local: Miniflare creates ephemeral SQLite DBs automatically (no action needed).
# Deploy: replace `database_id` with the real UUID from `wrangler d1 create`.
# -----------------------------------------------------------------------------

# Auth database: users, sessions, accounts, orgs, members, invitations, etc.
[[d1_databases]]
binding = "AUTH_DB"
database_name = "q-recruit-auth"
database_id = "00000000-0000-0000-0000-000000000001"  # replace for deploy
migrations_dir = "quickback/drizzle/auth"

# Features database: your app tables (candidates, jobs, applications).
[[d1_databases]]
binding = "DB"
database_name = "q-recruit-features"
database_id = "00000000-0000-0000-0000-000000000002"  # replace for deploy
migrations_dir = "quickback/drizzle/features"

# Webhooks database: inbound/outbound webhook state + delivery log.
[[d1_databases]]
binding = "WEBHOOKS_DB"
database_name = "q-recruit-webhooks"
database_id = "00000000-0000-0000-0000-000000000003"  # replace for deploy
migrations_dir = "quickback/drizzle/webhooks"


# -----------------------------------------------------------------------------
# KV namespace (cache + session store)
# -----------------------------------------------------------------------------
# Local: Miniflare simulates KV in memory.
# Deploy: replace `id` with the real namespace ID from `wrangler kv namespace create`.
# -----------------------------------------------------------------------------
[[kv_namespaces]]
binding = "KV"
id = "0000000000000000000000000000abcd"  # replace for deploy


# -----------------------------------------------------------------------------
# Queues — webhook processing (inbound + outbound) with a dead-letter queue.
# Queues work on local and production without config changes.
# -----------------------------------------------------------------------------
[[queues.producers]]
queue = "q-recruit-webhooks-queue"
binding = "WEBHOOKS_QUEUE"

[[queues.consumers]]
queue = "q-recruit-webhooks-queue"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "q-recruit-webhooks-dlq"

[[queues.consumers]]
queue = "q-recruit-webhooks-dlq"
max_batch_size = 1
